app = "trading-webhook-bridge"
primary_region = "sin"  # Singapore — gần VN nhất

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"   # KHÔNG sleep — luôn online 24/7
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
